<svg viewBox="0 0 1120 360" width="1120" height="360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- ===== card (AMOLED black) ===== -->
  <rect x="3" y="3" width="1114" height="354" rx="28" fill="#000000" stroke="#3D0E0E" stroke-width="2"/>

  <!-- red glow blobs -->
  <circle cx="1000" cy="180" r="150" fill="#FF2A2A" opacity="0.10"/>
  <circle cx="1010" cy="60" r="150" fill="#FF2A2A" opacity="0.06"/>
  <circle cx="120" cy="330" r="110" fill="#FF2A2A" opacity="0.05"/>

  <!-- ===== LEFT: wordmark + pitch ===== -->
  <text x="70" y="66" font-size="14" letter-spacing="3" font-weight="700" fill="#8A6A6A">A CODEX PLUGIN &#183; YOUR CREATIVE ADVISOR ON TAP</text>

  <text x="66" y="158" font-size="80" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Consult</tspan><tspan fill="#FF2A2A">Claude</tspan>
  </text>

  <text x="70" y="206" font-size="30" font-weight="600" fill="#ECECEC">Codex builds. Claude advises.</text>

  <text x="70" y="240" font-size="17" fill="#9A9A9A">Hand off the creative, planning-heavy work &#8212; without leaving Codex.</text>

  <!-- mode chips -->
  <g font-size="14" font-weight="600" fill="#FF4040" text-anchor="middle">
    <rect x="70"  y="270" width="78"  height="30" rx="15" fill="#1E0808" stroke="#5A1818" stroke-width="1"/>
    <text x="109" y="290">design</text>
    <rect x="156" y="270" width="66"  height="30" rx="15" fill="#1E0808" stroke="#5A1818" stroke-width="1"/>
    <text x="189" y="290">copy</text>
    <rect x="230" y="270" width="78"  height="30" rx="15" fill="#1E0808" stroke="#5A1818" stroke-width="1"/>
    <text x="269" y="290">review</text>
    <rect x="316" y="270" width="118" height="30" rx="15" fill="#1E0808" stroke="#5A1818" stroke-width="1"/>
    <text x="375" y="290">architecture</text>
    <rect x="442" y="270" width="86"  height="30" rx="15" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
    <text x="485" y="290" fill="#7A7A7A">+6 more</text>
  </g>

  <!-- faint divider tying the two halves -->
  <line x1="640" y1="70" x2="640" y2="290" stroke="#2A2A2A" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>

  <!-- ===== RIGHT: the handoff loop ===== -->
  <g>
    <!-- top arc: Codex asks Claude -->
    <path d="M 795 142 C 835 96 925 96 965 142" fill="none" stroke="#FF2A2A" stroke-width="3" stroke-linecap="round"/>
    <path d="M 965 142 l 1 -15 l -14 6 z" fill="#FF2A2A"/>
    <text x="880" y="84" font-size="17" font-style="italic" font-weight="600" fill="#FF2A2A" text-anchor="middle">asks</text>

    <!-- bottom arc: Claude advises Codex -->
    <path d="M 965 218 C 925 264 835 264 795 218" fill="none" stroke="#8A3A3A" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5"/>
    <path d="M 795 218 l -1 15 l 14 -6 z" fill="#8A3A3A"/>
    <text x="880" y="300" font-size="17" font-style="italic" font-weight="600" fill="#A05656" text-anchor="middle">advises</text>

    <!-- Codex node (the builder) -->
    <circle cx="760" cy="180" r="52" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="3"/>
    <g transform="translate(760,180)" fill="#FFFFFF">
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(0)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(45)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(90)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(135)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(180)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(225)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(270)"/>
      <rect x="-5" y="-32" width="10" height="13" rx="2" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="9" fill="#0D0D0D"/>
    </g>

    <!-- Claude node (the advisor) -->
    <circle cx="1000" cy="180" r="56" fill="#FF2A2A" opacity="0.18"/>
    <circle cx="1000" cy="180" r="52" fill="#FF2A2A"/>
    <g transform="translate(1000,180)" fill="#000000">
      <!-- idea rays -->
      <g stroke="#000000" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-34" x2="0" y2="-26"/>
        <line x1="-22" y1="-22" x2="-16" y2="-16"/>
        <line x1="22" y1="-22" x2="16" y2="-16"/>
      </g>
      <!-- bulb -->
      <circle cx="0" cy="-6" r="19"/>
      <rect x="-9" y="11" width="18" height="13" rx="3"/>
      <line x1="-7" y1="16" x2="7" y2="16" stroke="#FF2A2A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-6" y1="20" x2="6" y2="20" stroke="#FF2A2A" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- node labels -->
    <g text-anchor="middle">
      <text x="760"  y="256" font-size="19" font-weight="700" fill="#FFFFFF">Codex</text>
      <text x="760"  y="276" font-size="14" fill="#8A8A8A">the builder</text>
      <text x="1000" y="256" font-size="19" font-weight="700" fill="#FF2A2A">Claude</text>
      <text x="1000" y="276" font-size="14" fill="#8A8A8A">the advisor</text>
    </g>
  </g>
</svg>
