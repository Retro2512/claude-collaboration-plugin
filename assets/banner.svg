<svg viewBox="0 0 1120 340" width="1120" height="340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- ===== card ===== -->
  <rect x="3" y="3" width="1114" height="334" rx="28" fill="#F4EFE6" stroke="#E4DACB" stroke-width="2"/>

  <!-- soft decorative blobs -->
  <circle cx="1000" cy="170" r="150" fill="#C8603C" opacity="0.05"/>
  <circle cx="120" cy="320" r="110" fill="#C8603C" opacity="0.04"/>

  <!-- ===== LEFT: wordmark + tagline ===== -->
  <text x="66" y="158" font-size="84" font-weight="800" letter-spacing="-2">
    <tspan fill="#20201E">Consult</tspan><tspan fill="#C8603C">Claude</tspan>
  </text>
  <rect x="72" y="178" width="118" height="7" rx="3.5" fill="#C8603C"/>

  <text x="72" y="226" font-size="29" font-weight="600" fill="#5E574D">Codex builds. Claude advises.</text>

  <!-- faint divider -->
  <line x1="640" y1="80" x2="640" y2="260" stroke="#E4DACB" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>

  <!-- ===== RIGHT: the handoff loop ===== -->
  <g>
    <!-- top arc: Codex -> Claude -->
    <path d="M 792 139 C 836 92 924 92 968 139" fill="none" stroke="#C8603C" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 968 139 l 3 -16 l -15 5 z" fill="#C8603C"/>

    <!-- think bubble on the asks arc -->
    <circle cx="880" cy="96" r="17" fill="#FBF7F0" stroke="#C8603C" stroke-width="2.5"/>
    <text x="880" y="103" font-size="22" font-weight="800" fill="#C8603C" text-anchor="middle">?</text>
    <path d="M 872 110 l 10 0 l -7 9 z" fill="#FBF7F0" stroke="#C8603C" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- bottom arc: Claude -> Codex -->
    <path d="M 968 231 C 924 278 836 278 792 231" fill="none" stroke="#B89A8C" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="7 6"/>
    <path d="M 792 231 l -3 16 l 15 -5 z" fill="#B89A8C"/>

    <!-- spark on the advises arc (Claude's idea coming back) -->
    <g transform="translate(880,272)" fill="#C8603C">
      <path d="M 0 -13 L 3 -3 L 13 0 L 3 3 L 0 13 L -3 3 L -13 0 L -3 -3 Z"/>
      <circle cx="16" cy="-12" r="2.4"/>
      <circle cx="-15" cy="11" r="2"/>
    </g>

    <!-- Codex node (gear = builder) -->
    <circle cx="760" cy="185" r="56" fill="#FBF7F0" stroke="#20201E" stroke-width="3"/>
    <g transform="translate(760,185)" fill="#20201E">
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(0)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(45)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(90)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(135)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(180)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(225)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(270)"/>
      <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="22"/>
      <circle cx="0" cy="0" r="10" fill="#FBF7F0"/>
    </g>

    <!-- Claude node (lightbulb = advisor) -->
    <circle cx="1000" cy="185" r="60" fill="#C8603C" opacity="0.16"/>
    <circle cx="1000" cy="185" r="56" fill="#C8603C"/>
    <g transform="translate(1000,185)" fill="#FFFFFF">
      <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-37" x2="0" y2="-28"/>
        <line x1="-24" y1="-24" x2="-18" y2="-18"/>
        <line x1="24" y1="-24" x2="18" y2="-18"/>
      </g>
      <circle cx="0" cy="-7" r="21"/>
      <rect x="-10" y="12" width="20" height="14" rx="3"/>
      <line x1="-7" y1="17" x2="7" y2="17" stroke="#C8603C" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-6" y1="22" x2="6" y2="22" stroke="#C8603C" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- node names -->
    <g text-anchor="middle" font-size="20" font-weight="700">
      <text x="760"  y="272" fill="#20201E">Codex</text>
      <text x="1000" y="272" fill="#C8603C">Claude</text>
    </g>
  </g>
</svg>
