name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate public release files
        run: python .github/scripts/validate_public_release.py

      - name: Bridge dry run
        env:
          CONSULTCLAUDE_CLAUDE_PATH: python
        run: python plugins/consultclaude/scripts/consultclaude_cli.py --prompt "Smoke test" --dry-run --output json

      - name: Doctor check
        env:
          CONSULTCLAUDE_CLAUDE_PATH: python
        run: python plugins/consultclaude/scripts/consultclaude_cli.py --doctor --output json
