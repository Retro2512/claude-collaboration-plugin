name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate public release files
        run: python .github/scripts/validate_public_release.py

      - name: Bridge dry run
        env:
          CONSULTCLAUDE_CLAUDE_PATH: python3
        run: python plugins/consultclaude/scripts/consultclaude_cli.py --prompt "Smoke test" --dry-run --output json
