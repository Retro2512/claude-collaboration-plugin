name: Bug Report
description: Report a reproducible problem with the plugin.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: codex-version
    attributes:
      label: Codex CLI version
      placeholder: codex-cli 0.139.0
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code CLI version
      placeholder: claude --version
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, prompts, and relevant file paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: text
    validations:
      required: false
